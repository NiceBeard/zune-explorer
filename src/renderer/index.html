<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:; font-src 'self'; media-src 'self' file:;">
    <title>Zune</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="zune-container">
        <!-- Custom title bar (Windows only, hidden on macOS via CSS) -->
        <div class="title-bar" id="title-bar">
            <div class="title-bar-drag"></div>
            <div class="title-bar-controls">
                <button class="title-bar-btn" id="minimize-btn">&#x2014;</button>
                <button class="title-bar-btn" id="maximize-btn">&#x25A1;</button>
                <button class="title-bar-btn close-btn" id="close-btn">&#x2715;</button>
            </div>
        </div>
        <!-- Main panoramic 3D container -->
        <div class="panoramic-container" id="panoramic-container">
            
            <!-- Recent Files Panel (behind left) -->
            <div class="panel recent-panel">
                <h1 class="panel-header">recent</h1>
                <div class="recent-content">
                    <div class="recent-scroll" id="recent-files">
                        <div class="empty-state">no recent files</div>
                    </div>
                </div>
            </div>
            
            <!-- Main Menu Panel (center default) -->
            <div class="panel menu-panel">
                <!-- Recent files sidebar -->
                <div class="recent-sidebar" id="recent-sidebar">
                    <div class="recent-grid" id="recent-preview">
                        <div class="recent-empty">no recent files</div>
                    </div>
                </div>
                
                <div class="menu-container">
                    <h2 class="menu-subtitle">explore</h2>
                    <nav class="vertical-menu" id="vertical-menu">
                        <button class="menu-item" data-category="music">
                            <span class="menu-text">music</span>
                            <span class="menu-count" id="music-count">0</span>
                        </button>
                        <button class="menu-item" data-category="videos">
                            <span class="menu-text">videos</span>
                            <span class="menu-count" id="videos-count">0</span>
                        </button>
                        <button class="menu-item" data-category="pictures">
                            <span class="menu-text">pictures</span>
                            <span class="menu-count" id="pictures-count">0</span>
                        </button>
                        <button class="menu-item" data-category="documents">
                            <span class="menu-text">documents</span>
                            <span class="menu-count" id="documents-count">0</span>
                        </button>
                        <button class="menu-item" data-category="applications">
                            <span class="menu-text">applications</span>
                            <span class="menu-count" id="applications-count">0</span>
                        </button>
                    </nav>
                </div>
            </div>
            
            <!-- Category Content Panel (behind right) -->
            <div class="panel content-panel" id="content-panel">
                <div class="content-header">
                    <button class="back-button" id="back-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="title-group">
                        <div class="breadcrumb" id="breadcrumb"></div>
                        <h1 class="content-title" id="content-title"></h1>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" id="grid-view-btn" data-view="grid">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <rect x="2" y="2" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="12" y="2" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="2" y="12" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="12" y="12" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                        <button class="view-btn" id="list-view-btn" data-view="list">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M3 6H17M3 10H17M3 14H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="content-area">
                    <div class="file-display" id="file-display">
                        <!-- Dynamic content goes here -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Music Player Bottom Bar -->
    <div class="player-bottom-bar" id="player-bottom-bar">
        <div class="player-bar-art" id="player-bar-art">
            <svg width="40" height="40" viewBox="0 0 48 48" fill="none" class="player-bar-art-placeholder">
                <circle cx="24" cy="24" r="20" fill="#1a1a1a" stroke="#333" stroke-width="1.5"/>
                <circle cx="24" cy="24" r="14" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
                <circle cx="24" cy="24" r="10" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
                <circle cx="24" cy="24" r="5" fill="#ff6900" opacity="0.8"/>
                <circle cx="24" cy="24" r="2" fill="#1a1a1a"/>
            </svg>
            <img id="player-bar-art-img" class="player-bar-art-img" style="display:none" alt="Album art"/>
        </div>
        <div class="player-bar-info" id="player-bar-info">
            <div class="player-bar-title" id="player-bar-title">Not Playing</div>
            <div class="player-bar-artist" id="player-bar-artist"></div>
        </div>
        <div class="player-bar-progress">
            <span class="player-bar-time" id="player-bar-elapsed">0:00</span>
            <div class="player-bar-progress-track" id="player-bar-progress-track">
                <div class="player-bar-progress-fill" id="player-bar-progress-fill"></div>
            </div>
            <span class="player-bar-time" id="player-bar-remaining">0:00</span>
        </div>
        <div class="player-bar-controls">
            <button class="player-btn" id="player-bar-prev" title="Previous">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
            <button class="player-btn player-btn-play" id="player-bar-play" title="Play/Pause">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path id="player-bar-play-path" d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button class="player-btn" id="player-bar-next" title="Next">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
        <div class="player-equalizer" id="player-equalizer">
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
        </div>
    </div>

    <!-- Now Playing Panel -->
    <div class="now-playing-panel" id="now-playing-panel">
        <button class="np-back-btn" id="np-back-btn" title="Close Now Playing">
            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="2"/>
                <path d="M28 16L20 24L28 32" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div class="np-content">
            <div class="np-track-info">
                <div class="np-artist" id="np-artist">UNKNOWN ARTIST</div>
                <div class="np-album" id="np-album">Unknown Album</div>
            </div>

            <div class="np-art-container">
                <div class="np-art" id="np-art">
                    <svg width="200" height="200" viewBox="0 0 48 48" fill="none" class="np-art-placeholder">
                        <circle cx="24" cy="24" r="22" fill="#111" stroke="#333" stroke-width="1"/>
                        <circle cx="24" cy="24" r="18" fill="none" stroke="#222" stroke-width="0.5"/>
                        <circle cx="24" cy="24" r="15" fill="none" stroke="#222" stroke-width="0.5"/>
                        <circle cx="24" cy="24" r="11" fill="none" stroke="#222" stroke-width="0.5"/>
                        <circle cx="24" cy="24" r="6" fill="#ff6900" opacity="0.6"/>
                        <circle cx="24" cy="24" r="2.5" fill="#111"/>
                    </svg>
                    <img id="np-art-img" class="np-art-img" style="display:none" alt="Album art"/>
                </div>
            </div>

            <div class="np-progress">
                <span class="np-time" id="np-elapsed">0:00</span>
                <div class="np-progress-track" id="np-progress-track">
                    <div class="np-progress-fill" id="np-progress-fill"></div>
                </div>
                <span class="np-time" id="np-remaining">0:00</span>
            </div>

            <div class="np-title" id="np-title">Not Playing</div>

            <div class="np-controls">
                <button class="np-ctrl-btn" id="np-shuffle" title="Shuffle">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
                        <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
                        <line x1="4" y1="4" x2="9" y2="9"/>
                    </svg>
                </button>
                <button class="np-ctrl-btn" id="np-prev" title="Previous">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="np-ctrl-btn np-play-btn" id="np-play" title="Play/Pause">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor">
                        <path id="np-play-path" d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button class="np-ctrl-btn" id="np-next" title="Next">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
                <button class="np-ctrl-btn" id="np-repeat" title="Repeat">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                        <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
                    </svg>
                </button>
            </div>

            <div class="np-queue" id="np-queue">
                <div class="np-queue-header">Up Next</div>
                <div class="np-queue-list" id="np-queue-list"></div>
            </div>
        </div>
    </div>

    <!-- Zune Sync Panel -->
    <div class="zune-sync-panel" id="zune-sync-panel">
        <div class="zune-sync-header">
            <h1 class="zune-sync-title" id="zune-sync-title">zune hd</h1>
            <p class="zune-sync-subtitle" id="zune-sync-subtitle">connecting...</p>
        </div>

        <div class="zune-sync-storage" id="zune-sync-storage" style="display:none">
            <div class="zune-storage-bar">
                <div class="zune-storage-fill" id="zune-storage-fill"></div>
            </div>
            <span class="zune-storage-text" id="zune-storage-text">0 GB free</span>
        </div>

        <div class="zune-sync-idle" id="zune-sync-idle" style="display:none">
            <div class="zune-drop-zone" id="zune-drop-zone">
                <p class="zune-drop-text">drag files here</p>
                <p class="zune-drop-subtext">or use the buttons below</p>
            </div>
            <div class="zune-sync-buttons">
                <button class="zune-sync-btn" id="zune-sync-music">sync music</button>
                <button class="zune-sync-btn" id="zune-sync-videos">sync videos</button>
                <button class="zune-sync-btn" id="zune-sync-pictures">sync pictures</button>
            </div>
        </div>

        <div class="zune-sync-progress" id="zune-sync-progress" style="display:none">
            <p class="zune-progress-count" id="zune-progress-count">sending 0 of 0</p>
            <p class="zune-progress-file" id="zune-progress-file"></p>
            <div class="zune-progress-bar">
                <div class="zune-progress-fill" id="zune-progress-fill"></div>
            </div>
            <p class="zune-progress-bytes" id="zune-progress-bytes"></p>
            <p class="zune-progress-label">overall</p>
            <div class="zune-progress-bar">
                <div class="zune-progress-overall" id="zune-progress-overall"></div>
            </div>
            <button class="zune-cancel-btn" id="zune-cancel-btn">cancel</button>
        </div>

        <div class="zune-sync-complete" id="zune-sync-complete" style="display:none">
            <p class="zune-complete-text" id="zune-complete-text">0 files synced</p>
        </div>
    </div>

    <button class="zune-toggle-btn" id="zune-toggle-btn" style="display:none" title="Zune Sync">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="5" y="2" width="14" height="20" rx="2"/>
            <circle cx="12" cy="16" r="2"/>
            <line x1="9" y1="6" x2="15" y2="6"/>
        </svg>
    </button>

    <div class="context-menu" id="context-menu">
        <button class="context-menu-item" data-action="open">Open</button>
        <button class="context-menu-item" data-action="show-in-folder">Show in Finder</button>
        <button class="context-menu-item" data-action="send-to-zune" id="ctx-send-to-zune" style="display:none">Send to Zune</button>
        <div class="context-menu-separator"></div>
        <button class="context-menu-item" data-action="delete">Delete</button>
    </div>

    <script src="../assets/js/audio-player.js"></script>
    <script src="../assets/js/renderer.js"></script>
</body>
</html>
