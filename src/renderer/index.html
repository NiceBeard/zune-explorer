<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:; font-src 'self'; media-src 'self' file:;">
    <title>Zune</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
</head>
<body>
    <div class="zune-container">
        <!-- Custom title bar (Windows only, hidden on macOS via CSS) -->
        <div class="title-bar" id="title-bar">
            <div class="title-bar-drag"></div>
            <div class="title-bar-controls">
                <button class="title-bar-btn" id="minimize-btn">&#x2014;</button>
                <button class="title-bar-btn" id="maximize-btn">&#x25A1;</button>
                <button class="title-bar-btn close-btn" id="close-btn">&#x2715;</button>
            </div>
        </div>
        <!-- Main panoramic 3D container -->
        <div class="panoramic-container" id="panoramic-container">
            
            <!-- Recent Files Panel (behind left) -->
            <div class="panel recent-panel">
                <h1 class="panel-header">recent</h1>
                <div class="recent-content">
                    <div class="recent-scroll" id="recent-files">
                        <div class="empty-state">no recent files</div>
                    </div>
                </div>
            </div>
            
            <!-- Main Menu Panel (center default) -->
            <div class="panel menu-panel">
                <!-- Recent files sidebar -->
                <div class="recent-sidebar" id="recent-sidebar">
                    <div class="recent-grid" id="recent-preview">
                        <div class="recent-empty">no recent files</div>
                    </div>
                </div>
                
                <div class="menu-container">
                    <h2 class="menu-subtitle">explore</h2>
                    <nav class="vertical-menu" id="vertical-menu">
                        <button class="menu-item" data-category="music">
                            <span class="menu-text">music</span>
                            <span class="menu-count" id="music-count">0</span>
                        </button>
                        <button class="menu-item" data-category="videos">
                            <span class="menu-text">videos</span>
                            <span class="menu-count" id="videos-count">0</span>
                        </button>
                        <button class="menu-item" data-category="pictures">
                            <span class="menu-text">pictures</span>
                            <span class="menu-count" id="pictures-count">0</span>
                        </button>
                        <button class="menu-item" data-category="documents">
                            <span class="menu-text">documents</span>
                            <span class="menu-count" id="documents-count">0</span>
                        </button>
                        <button class="menu-item" data-category="applications">
                            <span class="menu-text">applications</span>
                            <span class="menu-count" id="applications-count">0</span>
                        </button>
                    </nav>
                </div>
            </div>
            
            <!-- Category Content Panel (behind right) -->
            <div class="panel content-panel" id="content-panel">
                <div class="content-header">
                    <button class="back-button" id="back-button">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                            <path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                    <div class="title-group">
                        <div class="breadcrumb" id="breadcrumb"></div>
                        <h1 class="content-title" id="content-title"></h1>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" id="grid-view-btn" data-view="grid">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <rect x="2" y="2" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="12" y="2" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="2" y="12" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                                <rect x="12" y="12" width="6" height="6" stroke="currentColor" stroke-width="1.5"/>
                            </svg>
                        </button>
                        <button class="view-btn" id="list-view-btn" data-view="list">
                            <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                                <path d="M3 6H17M3 10H17M3 14H17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="content-area">
                    <div class="file-display" id="file-display">
                        <!-- Dynamic content goes here -->
                    </div>
                </div>
            </div>
            
        </div>
    </div>

    <!-- Music Player Bottom Bar -->
    <div class="player-bottom-bar" id="player-bottom-bar">
        <div class="player-bar-art" id="player-bar-art">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" class="player-bar-art-placeholder">
                <rect width="24" height="24" rx="4" fill="#1a1a1a"/>
                <path d="M12 6v8.5M12 6l4 2v6.5" stroke="#666" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <circle cx="8" cy="14.5" r="2.5" stroke="#666" stroke-width="1.5"/>
                <circle cx="16" cy="12.5" r="2.5" stroke="#666" stroke-width="1.5"/>
            </svg>
            <img id="player-bar-art-img" class="player-bar-art-img" style="display:none" alt="Album art"/>
        </div>
        <div class="player-bar-info" id="player-bar-info">
            <div class="player-bar-title" id="player-bar-title">Not Playing</div>
            <div class="player-bar-artist" id="player-bar-artist"></div>
        </div>
        <div class="player-bar-progress">
            <span class="player-bar-time" id="player-bar-elapsed">0:00</span>
            <div class="player-bar-progress-track" id="player-bar-progress-track">
                <div class="player-bar-progress-fill" id="player-bar-progress-fill"></div>
            </div>
            <span class="player-bar-time" id="player-bar-remaining">0:00</span>
        </div>
        <div class="player-bar-controls">
            <button class="player-btn" id="player-bar-prev" title="Previous">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
            <button class="player-btn player-btn-play" id="player-bar-play" title="Play/Pause">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path id="player-bar-play-path" d="M8 5v14l11-7z"/>
                </svg>
            </button>
            <button class="player-btn" id="player-bar-next" title="Next">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
        <div class="player-equalizer" id="player-equalizer">
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
            <span class="eq-bar"></span>
        </div>
    </div>

    <div class="context-menu" id="context-menu">
        <button class="context-menu-item" data-action="open">Open</button>
        <button class="context-menu-item" data-action="show-in-folder">Show in Finder</button>
        <div class="context-menu-separator"></div>
        <button class="context-menu-item" data-action="delete">Delete</button>
    </div>

    <script src="../assets/js/audio-player.js"></script>
    <script src="../assets/js/renderer.js"></script>
</body>
</html>
